name: US Stock Screener Daily Run

on:
  schedule:
    - cron: '0 22 * * *' # 毎日 UTC 22:00 (ET 18:00 / JST 7:00)
  workflow_dispatch:

jobs:
  run-screener:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download existing artifacts
        uses: actions/download-artifact@v4
        with:
          name: us-screener-artifacts
          path: .
        continue-on-error: true

      - name: Ensure us_stocks.csv exists
        run: |
          if [ ! -f us_stocks.csv ]; then
            python generate_us_stocks.py
          fi

      - name: Run US Stock Screener
        env:
          LINE_BOT_TOKEN: ${{ secrets.LINE_BOT_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python us_stock_screener.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: us-screener-artifacts
          path: |
            us_model_v2.pkl
            us_market.db
            us_recommendation_history.csv
          if-no-files-found: ignore
