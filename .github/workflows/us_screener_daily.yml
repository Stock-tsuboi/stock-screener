name: US Stock Screener Daily Run

on:
  schedule:
    - cron: '0 22 * * *' # 毎日 UTC 22:00 (ET 18:00 / JST 7:00)
  workflow_dispatch:

jobs:
  run-screener:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore Market Data Cache
        uses: actions/cache@v4
        with:
          path: |
            us_market.db
            us_model_v2.pkl
            us_recommendation_history.csv
          key: us-screener-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            us-screener-${{ runner.os }}-

      - name: Ensure us_stocks.csv exists
        run: |
          if [ ! -f us_stocks.csv ]; then
            python generate_us_stocks.py
          fi

      - name: Run US Stock Screener
        env:
          LINE_BOT_TOKEN: ${{ secrets.LINE_BOT_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python us_stock_screener.py
