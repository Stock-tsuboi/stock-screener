name: Update US Stocks List

on:
  schedule:
    - cron: '0 0 * * SUN' # 毎週日曜 JST 9:00
  workflow_dispatch:

jobs:
  update-list:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install pandas lxml

      - name: Run script
        run: python generate_us_stocks.py

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update us_stocks.csv (automated)"
          file_pattern: "us_stocks.csv"
