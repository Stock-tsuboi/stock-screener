
name: Stock AI

on:
  workflow_dispatch:

  schedule:
    # 月〜金 8:55 JST (23:55 UTC 日〜木) - 混雑回避のため5分前起動
    - cron: '55 23 * * 0-4'
    # 月〜金 15:00 JST (06:00 UTC 月〜金)
    - cron: '0 6 * * 1-5'

jobs:
  run:

    runs-on: ubuntu-latest

    env:
      LINE_BOT_TOKEN: ${{ secrets.LINE_BOT_TOKEN }}
      LINE_USER_ID: ${{ secrets.LINE_USER_ID }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install packages
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Cache Stock Data and Model
      uses: actions/cache@v4
      with:
        path: |
          market.db*
          model_v2.pkl
        key: stock-data-${{ runner.os }}-${{ github.run_id }}
        restore-keys: |
          stock-data-${{ runner.os }}-

    - name: Run Stock AI
      run: |
        python stock_screener.py
