name: Stock Screener Bot

on:
  schedule:
    # 月〜金 8:42 JST (23:42 UTC) - 寄付き前チェック（混雑を避けるため42分に設定）
    - cron: '42 23 * * 1-5'
    # 月〜金 16:12 JST (07:12 UTC) - 大引け後チェック（15時台の混雑ピークを回避）
    - cron: '12 7 * * 1-5'
  workflow_dispatch: # 手動実行も可能にする

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 履歴ファイルをリポジトリに書き込むために必要

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        # キャッシュがあればインストールをスキップまたは高速化
        run: |
          pip install numpy pandas requests duckdb yfinance joblib scikit-learn

      - name: Cache Stock Data and Model
        uses: actions/cache@v4
        with:
          path: |
            market.db*
            model_v2.pkl
            cache/
          key: stock-data-${{ runner.os }}-v2 # バージョンを上げて再学習を強制
          restore-keys: |
            stock-data-${{ runner.os }}-

      - name: Run stock screener
        env:
          LINE_BOT_TOKEN: ${{ secrets.LINE_BOT_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python stock_screener.py

      - name: Commit and push history
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          if [ -f recommendation_history.csv ]; then
            git add recommendation_history.csv
            git commit -m "Update recommendation history [skip ci]" || echo "No changes to commit"
            git push
          fi
