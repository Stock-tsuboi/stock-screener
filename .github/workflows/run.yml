name: Run Screener

on:
  schedule:
    - cron: "0 0 * * *"   # 毎日 09:00 JST に実行（UTC 0:00）
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # 日本語ファイル名のまま、3つの zip を順番に結合
      - name: Rebuild zip
        run: |
          echo "結合するファイル一覧:"
          ls -1
          cat モデル*zip.001 モデル*zip.002 モデル*zip.003 > model.zip

      - name: Unzip model
        run: unzip -o model.zip

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run screener
        run: python screening_ai.py

        run: pip install -r requirements.txt

      - name: Run screener
        run: python screening_ai.py
