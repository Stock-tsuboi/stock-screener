name: Run Screener

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # ZIP を結合
      - name: Rebuild zip
        run: |
          echo "=== ファイル一覧 ==="
          ls -1
          echo "=== ZIP を結合中 ==="
          cat model_2.zip.001 model_2.zip.002 model_2.zip.003 > model.zip

      # ZIP を解凍
      - name: Unzip model
        run: unzip -o model.zip

      # 解凍されたファイルを確認
      - name: Check extracted files
        run: |
          echo "=== 展開されたファイル ==="
          ls -R

      # Python セットアップ
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # 依存関係インストール
      - name: Install dependencies
        run: pip install -r requirements.txt

      # スクリーナー実行
      - name: Run screener
        run: python screening_ai.py

