name: Run Screener

on:
  # 手動実行
  workflow_dispatch:

  # 自動実行
  schedule:
    # 昼12:00（JST）
    - cron: '0 3 * * 1-5'

jobs:
  run:
    runs-on: ubuntu-latest

    # ★ Secrets は job 全体に渡す（超重要）
    env:
      JQ_API_KEY: ${{ secrets.JQ_API_KEY }}
      JQ_PASSWORD: ${{ secrets.JQ_PASSWORD }}
      LINE_BOT_TOKEN: ${{ secrets.LINE_BOT_TOKEN }}
      LINE_USER_ID: ${{ secrets.LINE_USER_ID }}

    steps:
      # 1. リポジトリ取得
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Python セットアップ
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. 依存関係インストール
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 3.5 キャッシュ設定 (株価データとモデル)
      - name: Cache Stock Data and Model
        uses: actions/cache@v4
        with:
          path: |
            market.db*
            model.pkl
          key: stock-data-run-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            stock-data-run-${{ runner.os }}-

      # 4. ZIPモデル展開（必要な場合）
      - name: Unzip model
        run: |
          if [ -f model_2.zip ]; then
            unzip -o model_2.zip
          fi

      # 5. スクリーナー実行（失敗してもログは残す）
      - name: Run Screener
        run: python screening_ai.py
