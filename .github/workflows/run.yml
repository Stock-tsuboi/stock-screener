name: Run Screener

on:
  schedule:
    - cron: "0 0 * * *"   # 毎日 09:00 JST に実行（UTC 0:00）
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Rebuild zip
        run: cat model_2.zip.* > model.zip

      - name: Unzip model
        run: unzip model.zip

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run screener
        run: python screening_ai.py
