name: Run Screener

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Check files
        run: |
          echo "=== ファイル一覧 ==="
          ls -1

      - name: Check zip contents
        run: |
          echo "=== ZIP の中身 ==="
          unzip -l model_2.zip

      - name: Unzip model
        run: unzip -o model_2.zip

      - name: Check extracted files
        run: |
          echo "=== 展開されたファイル ==="
          ls -R

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run screener
        run: python screening_ai.py
      - name: Run Screener
        run: python screening_ai.py
        env:
          JQ_API_KEY: ${{ secrets.JQ_API_KEY }}

